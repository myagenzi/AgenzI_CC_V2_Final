  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

. White label partnerships. Enterprise tier. Products in development.<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"ry\">2027+<\u002Fdiv><div class=\"rt\">Platform<\u002Fdiv><div class=\"rd\">AgenzI OS — a full business operating platform for the AI era. The category we're building toward.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"manifesto rv d2\">\n      <div class=\"mq-q\">We started AgenzI because we kept watching good businesses fail — not from lack of talent or effort, but from lack of system. Too many vendors. Too many tools. Nobody owning the whole picture.<br><br>AI changed the economics of what's possible. We're using it to do something simple: build one system that actually works — so business owners can stop managing and start building.<\u002Fdiv>\n      <div class=\"mq-s\">— The AgenzI Team · Hyderabad, India · 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"sec sec-w\">\n  <div class=\"mw\">\n    <div class=\"eyebrow rv\">What We Stand For<\u002Fdiv>\n    <h2 class=\"h2 rv\">Our principles don't<br>change with the <span class=\"ac\">brief.<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:36px\" class=\"rv d1\">\n      <div style=\"padding:28px 26px;background:var(--off);border-radius:16px;border-left:3px solid var(--gold)\"><div class=\"vc-t\" style=\"font-size:17px;margin-bottom:8px\">We tell you what you need to hear — not what you want to.<\u002Fdiv><div class=\"vc-d\">If something won't work, we'll say so in the audit — not after you've spent six months on it.<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:28px 26px;background:var(--off);border-radius:16px;border-left:3px solid var(--peri)\"><div class=\"vc-t\" style=\"font-size:17px;margin-bottom:8px\">We only win when you win.<\u002Fdiv><div class=\"vc-d\">Retainer revenue means nothing if your business isn't growing. Our guarantee isn't marketing. It's accountability.<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:28px 26px;background:var(--off);border-radius:16px;border-left:3px solid var(--pink)\"><div class=\"vc-t\" style=\"font-size:17px;margin-bottom:8px\">We build for compounding, not one-offs.<\u002Fdiv><div class=\"vc-d\">Every system we build is designed to get better with time. Month three should outperform month one by default.<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:28px 26px;background:var(--off);border-radius:16px;border-left:3px solid var(--nebula)\"><div class=\"vc-t\" style=\"font-size:17px;margin-bottom:8px\">Small number of clients. Deep commitment.<\u002Fdiv><div class=\"vc-d\">We limit intake deliberately. Every client gets a dedicated Human Agent who treats your business like their own.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"ctasec\"><h2 class=\"cta-h rv\">Ready to build<br>the system your<br><span style=\"color:var(--gold)\">business deserves?<\u002Fspan><\u002Fh2><p class=\"cta-s rv d1\">Start with a free 30-minute audit. No commitment. Just clarity.<\u002Fp><div class=\"cta-btns rv d2\"><button class=\"btnp\" onclick=\"go('connect')\">Book Your Free AI Audit →<\u002Fbutton><button class=\"btnw\" onclick=\"go('pricing')\">See pricing<\u002Fbutton><\u002Fdiv><\u002Fsection>\n<footer><div class=\"mw\"><div class=\"fb\"><span class=\"fcopy\">© 2026 AgenzI · About<\u002Fspan><div class=\"fright\"><a onclick=\"go('home')\">Home<\u002Fa><a onclick=\"go('connect')\">Contact →<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Ffooter>\n<\u002Fdiv>\n\n<!-- ═══════════════════════ CONNECT ═══════════════════════ -->\n<div class=\"pg\" id=\"pg-connect\">\n<section class=\"shero\" style=\"min-height:40vh\"><div class=\"shero-bg\"><\u002Fdiv><div class=\"shero-c\">\n  <div class=\"sbadge\"><div class=\"sbd\"><\u002Fdiv><div class=\"sbt\">FREE AUDIT · NO COMMITMENT<\u002Fdiv><\u002Fdiv>\n  <h1 class=\"h1\" style=\"color:var(--starlight);margin-bottom:14px;letter-spacing:-2.5px\">Book Your<br><em style=\"font-style:normal;color:var(--gold)\">Free AI Audit.<\u002Fem><\u002Fh1>\n  <p style=\"font-size:16px;color:var(--moondust);max-width:420px;line-height:1.75\">30 minutes. We map what's broken. You leave with a clear roadmap — yours to keep regardless.<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<section class=\"sec sec-w\">\n  <div class=\"mw\">\n    <div class=\"connect-lay\">\n      <div>\n        <div class=\"eyebrow rv\">What to expect<\u002Fdiv>\n        <h2 class=\"h2 rv\" style=\"font-size:clamp(24px,3vw,40px)\">A 30-minute call that changes<br>how you see your business.<\u002Fh2>\n        <p class=\"lead rv d1\" style=\"margin-bottom:36px\">We don't pitch. We listen, map, and show you exactly what's leaking — and what the fix looks like.<\u002Fp>\n        <div class=\"ci-item rv d2\"><div class=\"ci-ic\">🔍<\u002Fdiv><div><div class=\"ci-t\">We map your current setup<\u002Fdiv><div class=\"ci-d\">Where time is wasted, where money leaks, where AI can win fastest.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"ci-item rv d3\"><div class=\"ci-ic\">📋<\u002Fdiv><div><div class=\"ci-t\">You get a roadmap<\u002Fdiv><div class=\"ci-d\">A prioritised list of what to fix and in what order — yours to keep.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"ci-item rv d4\"><div class=\"ci-ic\">✅<\u002Fdiv><div><div class=\"ci-t\">No obligation<\u002Fdiv><div class=\"ci-d\">You decide what happens next. No pressure, no automatic enrolment.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:32px;padding:22px 26px;background:var(--off);border-radius:14px;border-left:3px solid var(--gold)\" class=\"rv d4\">\n          <p style=\"font-size:14px;color:#777;line-height:1.7\"><strong style=\"color:var(--cosmic)\">We're based in Hyderabad, India<\u002Fstrong> — and work with founders, D2C brands, SMBs, coaches, and growth-stage startups across India and globally.<br><br>📧 <strong>hello@agenzi.com<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rv d1\">\n        <div class=\"fw\">\n          <div class=\"ft2\">Book your Free AI Audit<\u002Fdiv>\n          <div class=\"fs\">30 minutes. No pitch. No commitment.<\u002Fdiv>\n          <div class=\"frow\">\n            <div class=\"fg\"><label class=\"fl\">First name<\u002Flabel><input class=\"fi\" type=\"text\" placeholder=\"Your name\"><\u002Fdiv>\n            <div class=\"fg\"><label class=\"fl\">Last name<\u002Flabel><input class=\"fi\" type=\"text\" placeholder=\"Last name\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fg\"><label class=\"fl\">Business email<\u002Flabel><input class=\"fi\" type=\"email\" placeholder=\"you@company.com\"><\u002Fdiv>\n          <div class=\"fg\"><label class=\"fl\">WhatsApp number<\u002Flabel><input class=\"fi\" type=\"tel\" placeholder=\"+91 98765 43210\"><\u002Fdiv>\n          <div class=\"fg\"><label class=\"fl\">Business / Brand name<\u002Flabel><input class=\"fi\" type=\"text\" placeholder=\"Your business name\"><\u002Fdiv>\n          <div class=\"fg\"><label class=\"fl\">What are you struggling with most?<\u002Flabel><select class=\"fsel\"><option value=\"\">Select one...<\u002Foption><option>Too many vendors / no alignment<\u002Foption><option>Content creation taking too long<\u002Foption><option>Marketing not generating revenue<\u002Foption><option>Manual processes eating time<\u002Foption><option>AI tools not working for us<\u002Foption><option>All of the above<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"fg\"><label class=\"fl\">Tell us more (optional)<\u002Flabel><textarea class=\"fta\" placeholder=\"What's the biggest bottleneck in your business right now?\"><\u002Ftextarea><\u002Fdiv>\n          <button class=\"btnp\" style=\"width:100%;justify-content:center;margin-top:4px\" onclick=\"this.textContent='Submitted! We\\'ll be in touch shortly ✓';this.style.background='#22c55e'\">Book Free Audit →<\u002Fbutton>\n          <p class=\"fnote\">We respond within 24 hours. No spam. Ever.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<footer><div class=\"mw\"><div class=\"fb\"><span class=\"fcopy\">© 2026 AgenzI · Book Free Audit<\u002Fspan><div class=\"fright\"><a onclick=\"go('home')\">Home<\u002Fa><a onclick=\"go('pricing')\">Pricing →<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n// CURSOR\nconst cur=document.getElementById('cur'),curR=document.getElementById('curR');\ndocument.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px'});\ndocument.querySelectorAll('button,a,.engine,.ai,.bc,.pcard,.o-li,.mq,.ndd-i,.hsc,.halo-core').forEach(el=>{el.addEventListener('mouseenter',()=>curR.classList.add('h'));el.addEventListener('mouseleave',()=>curR.classList.remove('h'))});\n\n// NAV\nwindow.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>20));\n\n// PAGE NAVIGATION\nfunction go(id){\n  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));\n  const pg=document.getElementById('pg-'+id);\n  if(pg){pg.classList.add('on');window.scrollTo(0,0);observe();initHome();localStorage.setItem('pg',id);}\n}\nfunction toggleM(){document.getElementById('mnav').classList.toggle('on')}\nfunction sid(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}\n\n// RESTORE PAGE\nconst saved=localStorage.getItem('pg');if(saved){go(saved);}else{go('home');}\n\n// SCROLL REVEAL\nfunction observe(){\n  const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}})},{threshold:.12});\n  document.querySelectorAll('.pg.on .rv').forEach(el=>{if(!el.classList.contains('vis'))io.observe(el)});\n}\nobserve();\n\n// ACCORDION\nfunction acc(btn){\n  const item=btn.closest('.ai');\n  const isOpen=item.classList.contains('open');\n  btn.closest('.acc-grp').querySelectorAll('.ai').forEach(a=>{\n    a.classList.remove('open');\n    a.querySelector('.ab').style.maxHeight='0';\n  });\n  if(!isOpen){\n    item.classList.add('open');\n    const ab=item.querySelector('.ab');\n    ab.style.maxHeight=ab.scrollHeight+32+'px';\n  }\n}\n\n// TABS\nfunction switchT(id,btn){\n  btn.closest('.ttabs').querySelectorAll('.tt').forEach(t=>t.classList.remove('on'));\n  btn.classList.add('on');\n  btn.closest('div').querySelectorAll('.tp').forEach(t=>t.classList.remove('on'));\n  document.getElementById('tp-'+id)?.classList.add('on');\n}\n\n// ══════════════════════════════════════════\n// HOME PAGE v2 — radiance.family inspired\n// ══════════════════════════════════════════\n\nfunction initHome(){\n  // Only run on home page\n  if(!document.getElementById('pg-home')?.classList.contains('on')) return;\n\n  // LIVE CLOCK — Hyderabad IST\n  clearInterval(window._clockInterval);\n  function updateClock(){\n    const ist=new Intl.DateTimeFormat('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());\n    const el=document.getElementById('liveTime');\n    if(el) el.textContent='IST '+ist;\n  }\n  updateClock();\n  window._clockInterval=setInterval(updateClock,1000);\n\n  // MOUSE-REACTIVE HALO CORE\n  const haloWrap=document.getElementById('haloWrap');\n  const haloCore=document.getElementById('haloCore');\n  if(haloWrap&&haloCore){\n    window._haloMove=e=>{\n      const rect=haloWrap.getBoundingClientRect();\n      if(rect.width===0) return;\n      const dx=Math.max(-1,Math.min(1,(e.clientX-rect.left-rect.width/2)/(rect.width/2)));\n      const dy=Math.max(-1,Math.min(1,(e.clientY-rect.top-rect.height/2)/(rect.height/2)));\n      haloCore.style.transform=`translate(${dx*16}px,${dy*16}px)`;\n    };\n    document.addEventListener('mousemove',window._haloMove);\n\n    // CLICK RIPPLE\n    haloCore.onclick=function(){\n      const r=document.createElement('div');\n      r.className='halo-ripple';\n      haloWrap.appendChild(r);\n      setTimeout(()=>r.remove(),950);\n    };\n  }\n\n  // COUNT-UP ANIMATION\n  function countUp(el){\n    const target=parseInt(el.dataset.target);\n    const suffix=el.dataset.suffix||'';\n    const dur=2000;\n    const t0=performance.now();\n    const tick=now=>{\n      const p=Math.min((now-t0)/dur,1);\n      const eased=1-Math.pow(1-p,3);\n      el.textContent=Math.round(eased*target)+suffix;\n      if(p<1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n  const countObs=new IntersectionObserver(entries=>{\n    entries.forEach(e=>{if(e.isIntersecting){countUp(e.target);countObs.unobserve(e.target);}});\n  },{threshold:.5});\n  document.querySelectorAll('#pg-home .count[data-target]').forEach(el=>countObs.observe(el));\n\n  // HORIZONTAL DRAG SCROLL\n  const track=document.getElementById('hscrollTrack');\n  if(track){\n    let isDragging=false,startX=0,scrollLeft=0;\n    track.onmousedown=e=>{isDragging=true;startX=e.pageX-track.offsetLeft;scrollLeft=track.scrollLeft;track.classList.add('dragging');};\n    track.onmouseleave=()=>{isDragging=false;track.classList.remove('dragging');};\n    track.onmouseup=()=>{isDragging=false;track.classList.remove('dragging');};\n    track.onmousemove=e=>{if(!isDragging)return;e.preventDefault();track.scrollLeft=scrollLeft-(e.pageX-track.offsetLeft-startX);};\n  }\n\n  // HERO HEADLINE WORD ANIMATION\n  const h1=document.getElementById('heroH1');\n  if(h1&&!h1.dataset.animated){\n    h1.dataset.animated='1';\n    const html=h1.innerHTML;\n    const lines=html.split('<br>');\n    h1.innerHTML=lines.map((line,li)=>{\n      const words=line.split(' ');\n      return words.map((w,wi)=>{\n        const delay=(li*words.length+wi)*0.06+0.1;\n        return `<span class=\"word\"><span class=\"inner\" style=\"animation-delay:${delay}s\">${w}<\u002Fspan><\u002Fspan>`;\n      }).join(' ');\n    }).join('<br>');\n  }\n}\n\n// Init on first load\ninitHome();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
